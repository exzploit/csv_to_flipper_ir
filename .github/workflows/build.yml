name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: csv_to_flipper_ir.exe
            asset_name: csv_to_flipper_ir_windows.exe
          - os: macos-latest
            artifact_name: dist/csv_to_flipper_ir.app
            asset_name: csv_to_flipper_ir_mac.zip
          - os: ubuntu-latest
            artifact_name: dist/csv_to_flipper_ir
            asset_name: csv_to_flipper_ir_linux

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (Windows/Linux)
        if: matrix.os != 'macos-latest'
        run: pyinstaller --onefile --windowed csv_to_flipper_ir.py

      - name: Build with PyInstaller (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --onefile --windowed csv_to_flipper_ir.py
          cd dist
          zip -r ../csv_to_flipper_ir_mac.zip csv_to_flipper_ir.app

      - name: Rename Artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: move dist\csv_to_flipper_ir.exe csv_to_flipper_ir_windows.exe

      - name: Rename Artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: mv dist/csv_to_flipper_ir csv_to_flipper_ir_linux

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
